server {
  listen 80;
  server_name test1.local;

  charset utf-8;

  # 业务前端静态资源
  location / {
    root /app/runtime/project-web/test1/prod/current;
    try_files $uri /index.html;
  }

  # 平台登录接口（全局）
  location = /api/auth/login {
    proxy_pass http://127.0.0.1:3000/api/auth/login;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 授权码登录（跨域回跳）
  location = /api/auth/authorize {
    proxy_pass http://127.0.0.1:3000/api/auth/authorize;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/auth/token {
    proxy_pass http://127.0.0.1:3000/api/auth/token;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 以下固定为业务前端统一入口，不暴露 /api/gw/:project/:env
  location = /api/auth/me {
    proxy_pass http://127.0.0.1:3000/api/gw/test1/prod/auth/me;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/sql {
    proxy_pass http://127.0.0.1:3000/api/gw/test1/prod/sql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/health {
    proxy_pass http://127.0.0.1:3000/api/gw/test1/prod/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 业务 API 短路由：/api/:apiKey → /api/gw/:project/:env/api/:apiKey
  location ~ ^/api/(.+)$ {
    proxy_pass http://127.0.0.1:3000/api/gw/test1/prod/api/$1;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
