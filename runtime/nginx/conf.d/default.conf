server {
  listen 80 default_server;
  server_name _;

  charset utf-8;
  root /app/frontend-app/dist;

  # 内网无域名模式：
  # 通过 /p/{projectKey}/{env}/ 区分项目，不依赖三级域名。
  location ~ ^/p/([a-z0-9_-]+)/([a-z0-9_-]+)$ {
    return 302 /p/$1/$2/;
  }

  # /p/{project}/{env}/api/* 业务 API 映射
  location ~ ^/p/([a-z0-9_-]+)/([a-z0-9_-]+)/api/auth/me$ {
    proxy_pass http://127.0.0.1:3000/api/gw/$1/$2/auth/me;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/p/([a-z0-9_-]+)/([a-z0-9_-]+)/api/sql$ {
    proxy_pass http://127.0.0.1:3000/api/gw/$1/$2/sql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/p/([a-z0-9_-]+)/([a-z0-9_-]+)/api/health$ {
    proxy_pass http://127.0.0.1:3000/api/gw/$1/$2/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/p/([a-z0-9_-]+)/([a-z0-9_-]+)/api/(.+)$ {
    proxy_pass http://127.0.0.1:3000/api/gw/$1/$2/api/$3;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # /p/{project}/{env}/xxx 静态资源与 SPA 路由
  location ~ ^/p/([a-z0-9_-]+)/([a-z0-9_-]+)/(.*)$ {
    set $project_key $1;
    set $env_key $2;
    set $asset_path $3;
    root /app/runtime/project-web;
    try_files /$project_key/$env_key/current/$asset_path /$project_key/$env_key/current/index.html =404;
  }

  # 管理后台（默认站点）
  location / {
    try_files $uri /index.html;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
